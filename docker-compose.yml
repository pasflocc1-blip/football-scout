version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: football_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-football123}
      POSTGRES_DB: ${POSTGRES_DB:-football_scout}
      PGTZ: Europe/Rome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football} -d ${POSTGRES_DB:-football_scout}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - football_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: football_backend
    restart: unless-stopped
    # env_file carica il .env nel container.
    # In CI il file viene creato dal Secret GitHub prima di docker compose up,
    # quindi funziona sia in locale che in CI senza modifiche.
    env_file:
      - path: ./backend/.env
        required: false   # non rompe se il file manca (Docker Compose >= 2.24)
    environment:
      # DATABASE_URL sovrascrive quello del .env con il valore corretto
      # per la rete Docker interna (host "db" invece di "localhost")
      - DATABASE_URL=postgresql://${POSTGRES_USER:-football}:${POSTGRES_PASSWORD:-football123}@db:5432/${POSTGRES_DB:-football_scout}
      - POSTGRES_USER=${POSTGRES_USER:-football}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-football123}
      - POSTGRES_DB=${POSTGRES_DB:-football_scout}
      # Playwright usa /tmp per i file temporanei del browser
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Cartella per CSV FBref importati manualmente
      # Metti i file CSV qui e importali via endpoint /ingest/fbref/csv-upload
      - ./data/fbref_csv:/app/data/fbref_csv
    depends_on:
      db:
        condition: service_healthy
    networks:
      - football_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: football_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - football_net

volumes:
  postgres_data:

networks:
  football_net:
    driver: bridge