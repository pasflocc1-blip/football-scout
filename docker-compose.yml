version: "3.9"

services:
  # ─────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: football_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-football123}
      POSTGRES_DB: ${POSTGRES_DB:-football_scout}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - football_net

  # ─────────────────────────────────────────
  # BACKEND (FastAPI)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: football_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-football}:${POSTGRES_PASSWORD:-football123}@db:5432/${POSTGRES_DB:-football_scout}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot-reload in sviluppo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - football_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────
  # FRONTEND (Vue 3)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: football_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app         # hot-reload in sviluppo
      - /app/node_modules       # evita sovrascrittura node_modules host
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - football_net

volumes:
  postgres_data:

networks:
  football_net:
    driver: bridge
