server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router — tutte le rotte tornano a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets compilati da Vite (hanno hash nel nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API verso backend (se frontend e backend sullo stesso server)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    gzip on;
    gzip_types text/plain application/javascript application/json text/css;
}
