name: CI — Football Scout

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Mantengo il tuo Job 1 identico (molto utile per il Mac)
  line-endings:
    name: "🔍 Verifica LF (cross-platform guard)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Controlla che non ci siano CRLF nel repository
        run: |
          echo "Cerco file di testo con CRLF..."
          CRLF_FILES=$(find . -not -path './.git/*' -not -path './node_modules/*' -type f \( -name '*.py' -o -name '*.yml' -o -name '*.sh' \) | xargs grep -rlP '\r$' 2>/dev/null || true)
          if [ -n "$CRLF_FILES" ]; then
            echo "❌ ERRORE: File con CRLF trovati."
            exit 1
          fi

  # Mantengo il tuo Job 2 identico
  test-backend:
    name: "🐍 Test Backend (FastAPI + pytest)"
    runs-on: ubuntu-latest
    needs: line-endings
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: football
          POSTGRES_PASSWORD: football123
          POSTGRES_DB: football_scout_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa e testa
        run: |
          pip install -r backend/requirements.txt pytest
          cd backend && DATABASE_URL=postgresql://football:football123@localhost:5432/football_scout_test pytest tests/ -v

  # Mantengo il tuo Job 3 identico
  build-frontend:
    name: "🎨 Build Frontend (Vue 3 + Vite)"
    runs-on: ubuntu-latest
    needs: line-endings
    steps:
      - uses: actions/checkout@v4
      - name: Install & Build
        run: |
          cd frontend && npm install && npm run build

  # JOB 4 MODIFICATO: Qui usiamo il tuo Secret DOT_ENV_FILE
  docker-smoke-test:
    name: "🐳 Smoke test: git clone → docker compose up (simula Mac)"
    runs-on: ubuntu-latest
    needs: [ test-backend, build-frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # MODIFICA QUI: Invece di cp .env.example, usiamo il Secret
      - name: "Genera .env dai Secrets di GitHub"
        run: |
          mkdir -p backend
          echo "${{ secrets.DOT_ENV_FILE }}" > backend/.env
          # Forziamo la DATABASE_URL corretta per il network interno di Docker
          echo "DATABASE_URL=postgresql://football:football123@db:5432/football_scout" >> backend/.env

      - name: "Simula: docker compose up --build"
        run: docker compose up --build -d

      - name: Attendi health check backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000 > /dev/null 2>&1; then
              echo "✅ Backend OK"
              exit 0
            fi
            sleep 2
          done
          docker compose logs && exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v