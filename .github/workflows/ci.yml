name: CI — Football Scout

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# ─────────────────────────────────────────────────────────────────────
# SCOPO DEL CI:
# Garantire che chiunque faccia `git clone` + `docker compose up`
# su Mac, Linux o Windows riceva un progetto funzionante.
#
# Il job "line-endings" è IL job più importante:
# blocca il merge se qualcuno (da Windows) ha committato CRLF per errore.
# Questo è il motivo per cui il Mac non ha bisogno di nessun setup manuale.
# ─────────────────────────────────────────────────────────────────────

jobs:

  # ── JOB 1: Verifica line endings ─────────────────────────────────
  # Questo job è il "guardiano" del cross-platform.
  # Se passa, il Mac può fare git clone e tutto funziona senza setup.
  line-endings:
    name: "🔍 Verifica LF (cross-platform guard)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Controlla che non ci siano CRLF nel repository
        run: |
          echo "Cerco file di testo con CRLF (Windows line endings)..."
          CRLF_FILES=$(find . \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './frontend/node_modules/*' \
            -not -path './data/*' \
            -type f \( \
              -name '*.py'   -o -name '*.vue'  -o -name '*.js' \
              -o -name '*.ts' -o -name '*.json' -o -name '*.yml' \
              -o -name '*.yaml' -o -name '*.sh' -o -name '*.sql' \
              -o -name '*.md' -o -name '*.env*' -o -name 'Dockerfile*' \
              -o -name 'Makefile' \
            \) \
            | xargs grep -rlP '\r$' 2>/dev/null || true)

          if [ -n "$CRLF_FILES" ]; then
            echo ""
            echo "❌ ERRORE: File con CRLF trovati nel repository."
            echo "   Questo romperebbe il progetto su Mac e Linux."
            echo ""
            echo "   File problematici:"
            echo "$CRLF_FILES" | while read f; do echo "     - $f"; done
            echo ""
            echo "   SOLUZIONE (esegui sul PC Windows e ripusha):"
            echo "     git add --renormalize ."
            echo "     git commit -m 'fix: normalize line endings'"
            echo "     git push"
            exit 1
          fi

          echo "✅ Tutti i file hanno LF. Il Mac può fare git clone senza setup."

  # ── JOB 2: Test Backend ───────────────────────────────────────────
  test-backend:
    name: "🐍 Test Backend (FastAPI + pytest)"
    runs-on: ubuntu-latest
    needs: line-endings

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: football
          POSTGRES_PASSWORD: football123
          POSTGRES_DB: football_scout_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Installa dipendenze
        working-directory: backend
        run: pip install -r requirements.txt pytest

      - name: Esegui test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://football:football123@localhost:5432/football_scout_test
        run: pytest tests/ -v --tb=short

  # ── JOB 3: Build Frontend ─────────────────────────────────────────
  build-frontend:
    name: "🎨 Build Frontend (Vue 3 + Vite)"
    runs-on: ubuntu-latest
    needs: line-endings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze
        working-directory: frontend
        run: npm install

      - name: Build produzione
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Verifica output
        run: |
          [ -d "frontend/dist" ] && echo "✅ dist/ creata correttamente" || (echo "❌ dist/ mancante" && exit 1)

  # ── JOB 4: Docker smoke test (solo su push a main) ────────────────
  # Simula esattamente ciò che fa il Mac: git clone + docker compose up
  docker-smoke-test:
    name: "🐳 Smoke test: git clone → docker compose up (simula Mac)"
    runs-on: ubuntu-latest
    needs: [ test-backend, build-frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: "Simula: cp .env.example .env (come fa il Mac)"
        run: cp .env.example .env

      - name: "Simula: docker compose up --build (come fa il Mac)"
        run: docker compose up --build -d

      - name: Attendi health check backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000 > /dev/null 2>&1; then
              echo "✅ Backend risponde al tentativo $i"
              break
            fi
            [ $i -eq 30 ] && (echo "❌ Timeout" && docker compose logs && exit 1)
            sleep 2
          done

      - name: Verifica endpoint /docs (Swagger)
        run: |
          curl -sf http://localhost:8000/docs > /dev/null
          echo "✅ /docs OK"

      - name: Verifica endpoint /teams (API)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/teams)
          [ "$STATUS" = "200" ] && echo "✅ /teams OK (HTTP $STATUS)" || (echo "❌ HTTP $STATUS" && exit 1)

      - name: Log in caso di errore
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
